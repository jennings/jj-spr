query OpenPullRequestBranchesQuery($owner: String!, $name: String!, $first: Int!, $after: String) {
  repository(owner: $owner, name: $name) {
    pullRequests(states: [OPEN], first: $first, after: $after) {
      nodes {
        number
        headRefName
        baseRefName
      }
      pageInfo {
        hasNextPage
        endCursor
      }
    }
  }
}
